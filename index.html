document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

margin-bottom: 14px; text-align: right\" dir=\"ltr\">THE DIGITAL TEAM<\u002Fdiv>\n      <h2 style=\"font-size:clamp(26px,3.6vw,40px); font-weight:700; margin:0 0 12px; letter-spacing:-0.01em;\">צוות המומחים הדיגיטלי שאתם בוחרים&nbsp;<\u002Fh2>\n      <p style=\"font-size:16px; color:rgba(232,230,240,0.7); margin:0 0 34px;\">בחרו את המומחים שיצטרפו לצוות שלכם — <span style=\"color:#34d399; font-weight:600;\">{{ activeCount }}<\u002Fspan> פעילים כרגע<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:16px;\">\n        <sc-for list=\"{{ team }}\" as=\"m\" hint-placeholder-count=\"8\">\n          <div data-team-card=\"{{ m.idx }}\" onclick=\"{{ m.onClick }}\" style=\"cursor:pointer; padding:22px; border-radius:16px; background:rgba(255,255,255,0.03); border:1px solid {{ m.borderColor }}; backdrop-filter:blur(8px); opacity:{{ m.opacity }}; transition:opacity .3s ease, border-color .3s ease, transform .2s ease;\" style-hover=\"transform:translateY(-4px);\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;\">\n              <div style=\"width:42px; height:42px; border-radius:11px; background:{{ m.iconBg }}; border:1px solid {{ m.iconBorder }}; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:{{ m.iconColor }};\">{{ m.code }}<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:6px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:{{ m.dotColor }}; animation:{{ m.dotAnim }};\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.12em; color:{{ m.statusColor }};\" dir=\"ltr\">{{ m.statusText }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <h3 dir=\"ltr\" style=\"font-size:16px; font-weight:600; margin:0 0 6px; text-align:right;\">{{ m.name }}<\u002Fh3>\n            <p style=\"font-size:13px; line-height:1.55; color:rgba(232,230,240,0.6); margin:0;\">{{ m.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div id=\"team-cursor\" style=\"position:absolute; top:0; left:0; pointer-events:none; opacity:0; transform-origin:top left; transition:left .8s cubic-bezier(.4,0,.2,1), top .8s cubic-bezier(.4,0,.2,1), opacity .4s ease; z-index:5;\"><svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" style=\"display:block; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.55));\"><path d=\"M4 2 L4 19 L8.7 14.5 L11.8 21.5 L14.4 20.4 L11.3 13.6 L18 13.6 Z\" fill=\"#ffffff\" stroke=\"#1a1330\" stroke-width=\"1.1\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- VALUE ADD -->\n    <section style=\"max-width:1180px; margin:0 auto; padding:70px 24px 90px;\">\n      <div style=\"font-family:'Poppins',sans-serif; font-size:12px; letter-spacing:0.22em; color:#4fc3fe; margin-bottom:14px; text-align:center;\" dir=\"ltr\">EVERYTHING ON ONE PLATFORM<\u002Fdiv>\n      <h2 style=\"font-size:clamp(26px,3.6vw,40px); font-weight:700; margin:0 auto 44px; max-width:24ch; letter-spacing:-0.01em; text-align:center;\">הכל בפלטפורמה אחת — לא אוסף כלים<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:24px;\">\n        <div style=\"padding:34px; border-radius:20px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); display:flex; flex-direction:column; align-items:center; text-align:center;\">\n          <h3 style=\"font-size:22px; font-weight:600; margin:0 0 6px;\">מקור ידע אחד<\u002Fh3>\n          <p style=\"font-size:14px; color:rgba(232,230,240,0.6); margin:0 0 20px; line-height:1.5;\">כל שמונת המומחים שואבים מאותו מוח<\u002Fp>\n          <svg viewBox=\"0 0 400 400\" style=\"width:100%; max-width:340px; height:auto;\">\n            <defs>\n              <linearGradient id=\"gav-core\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#4fc3fe\"><\u002Fstop><stop offset=\"0.5\" stop-color=\"#8b5cf6\"><\u002Fstop><stop offset=\"1\" stop-color=\"#ec4899\"><\u002Fstop><\u002FlinearGradient>\n            <\u002Fdefs>\n            <g id=\"gav-core-lines\" stroke=\"url(#gav-core)\" stroke-width=\"1.4\" stroke-dasharray=\"4 5\" opacity=\"0.55\" style=\"animation:gav-dash 2.5s linear infinite;\">\n              <line x1=\"200\" y1=\"200\" x2=\"360\" y2=\"200\"><\u002Fline>\n              <line x1=\"200\" y1=\"200\" x2=\"313\" y2=\"313\"><\u002Fline>\n              <line x1=\"200\" y1=\"200\" x2=\"200\" y2=\"360\"><\u002Fline>\n              <line x1=\"200\" y1=\"200\" x2=\"87\" y2=\"313\"><\u002Fline>\n              <line x1=\"200\" y1=\"200\" x2=\"40\" y2=\"200\"><\u002Fline>\n              <line x1=\"200\" y1=\"200\" x2=\"87\" y2=\"87\"><\u002Fline>\n              <line x1=\"200\" y1=\"200\" x2=\"200\" y2=\"40\"><\u002Fline>\n              <line x1=\"200\" y1=\"200\" x2=\"313\" y2=\"87\"><\u002Fline>\n            <\u002Fg>\n            <g fill=\"url(#gav-core)\">\n              <circle cx=\"360\" cy=\"200\" r=\"7\"><\u002Fcircle><circle cx=\"313\" cy=\"313\" r=\"7\"><\u002Fcircle><circle cx=\"200\" cy=\"360\" r=\"7\"><\u002Fcircle><circle cx=\"87\" cy=\"313\" r=\"7\"><\u002Fcircle><circle cx=\"40\" cy=\"200\" r=\"7\"><\u002Fcircle><circle cx=\"87\" cy=\"87\" r=\"7\"><\u002Fcircle><circle cx=\"200\" cy=\"40\" r=\"7\"><\u002Fcircle><circle cx=\"313\" cy=\"87\" r=\"7\"><\u002Fcircle>\n            <\u002Fg>\n            <circle cx=\"200\" cy=\"200\" r=\"46\" fill=\"#0a0817\" stroke=\"url(#gav-core)\" stroke-width=\"2\"><\u002Fcircle>\n            <circle cx=\"200\" cy=\"200\" r=\"46\" fill=\"url(#gav-core)\" opacity=\"0.14\"><\u002Fcircle>\n            <text x=\"200\" y=\"196\" text-anchor=\"middle\" fill=\"#e8e6f0\" font-family=\"'JetBrains Mono',monospace\" font-size=\"12\" font-weight=\"600\">KNOWLEDGE<\u002Ftext>\n            <text x=\"200\" y=\"212\" text-anchor=\"middle\" fill=\"#4fc3fe\" font-family=\"'JetBrains Mono',monospace\" font-size=\"12\" font-weight=\"600\">CORE<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"padding:34px; border-radius:20px; background:linear-gradient(160deg,rgba(24,19,48,0.6),rgba(14,11,30,0.6)); border:1px solid rgba(139,92,246,0.25); display:flex; flex-direction:column; justify-content:center;\">\n          <h3 style=\"font-size:22px; font-weight:600; margin:0 0 12px;\">אותו מוח, כל ערוץ<\u002Fh3>\n          <p style=\"font-size:16px; line-height:1.6; color:rgba(232,230,240,0.8); margin:0 0 20px;\">אותה שיחה עוברת מטקסט לקול ובחזרה — בלחיצת כפתור ולבחירתכם<\u002Fp>\n          <div style=\"display:flex; align-items:center; gap:12px; padding:16px 18px; border-radius:14px; background:rgba(79,195,254,0.08); border:1px solid rgba(79,195,254,0.3);\">\n            <span style=\"width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg,#4fc3fe,#ec4899); animation:gav-pulse 1.6s infinite;\"><\u002Fspan>\n            <span style=\"font-size:15px; font-weight:500;\">להדגמת צ׳אט לייב עם סוכן&nbsp;👇🏻&nbsp;<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection><footer style=\"border-top:1px solid rgba(255,255,255,0.07); padding:50px 32px; display:flex; flex-direction:column; align-items:center; gap:18px; text-align:center;\">\n      <canvas data-orb=\"\" id=\"orb-footer\" style=\"width:60px; height:60px;\"><\u002Fcanvas>\n      <p dir=\"ltr\" style=\"font-size:18px; font-weight:600; margin:0; color:#ffffff;\">One Platform. <span style=\"background:linear-gradient(90deg,#4fc3fe,#8b5cf6,#ec4899); -webkit-background-clip:text; background-clip:text; color:transparent;\">Infinite Intelligence.<\u002Fspan><\u002Fp>\n      <span style=\"font-family: Poppins; font-size: 10px; letter-spacing: 0.16em; color: #FFFFFF\" dir=\"ltr\">POWERED BY<\u002Fspan><img src=\"eadb5bf6-9e0e-4683-a925-6582cfde0756\" alt=\"GAV Systems\" style=\"height: 34px; width: 207px\"><div style=\"display:flex; align-items:center; gap:10px; opacity:0.75;\">\n        \n        \n      <\u002Fdiv>\n      \n    <\u002Ffooter>\n\n    <!-- FOOTER -->\n    \n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;chatSide&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;left&quot;,&quot;right&quot;],&quot;default&quot;:&quot;left&quot;,&quot;tsType&quot;:&quot;'left'|'right'&quot;,&quot;section&quot;:&quot;צ'אט&quot;},&quot;bgStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;aurora&quot;,&quot;flow&quot;,&quot;constellation&quot;,&quot;particles&quot;],&quot;default&quot;:&quot;aurora&quot;,&quot;tsType&quot;:&quot;'aurora'|'flow'|'constellation'|'particles'&quot;,&quot;section&quot;:&quot;אנרגיה&quot;},&quot;bgDensity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:60,&quot;min&quot;:20,&quot;max&quot;:140,&quot;step&quot;:10,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;אנרגיה&quot;,&quot;unit&quot;:&quot;חלקיקים&quot;},&quot;orbSpeed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0.3,&quot;max&quot;:2.5,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;אנרגיה&quot;,&quot;unit&quot;:&quot;×&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    activeTab: 0,\n    cShowUser: false, cTyping: false, cShowAi: false,\n    aTyped: '', aCopilot: false,\n    mSat: 0, mFcr: 0, mAht: 0, mCalls: 0, mRec: false,\n    qScanned: 0, qC1: false, qC2: false, qC3: false, qRoute: false,\n    eTyped: '', eTip: false,\n    teamActive: [true, false, false, false, false, false, false, true],\n  };\n\n  TABS = [\n    { label: 'לקוח', heading: 'דמיינו שלקוח שואל — וה‑AI Agent עונה מיד', points: ['הלקוח כותב שאלה בשפה חופשית', 'ה‑AI Agent מבין את הכוונה ועונה תוך שנייה', 'פתרון מלא — בלי להמתין לנציג אנושי'] },\n    { label: 'נציג', heading: 'דמיינו שהנציג מקבל את הניסוח המושלם תוך כדי הקלדה', points: ['GAV Copilot מציע ניסוח בזמן אמת', 'אוטוקורקט מתקן שגיאות תוך כדי הקלדה', 'הצעת פעולה מוכנה — זיכוי + קופון בלחיצה'] },\n    { label: 'מנהל', heading: 'דמיינו שכל המוקד נפרש מולכם במסך אחד', points: ['דשבורד חי של כל מדדי המוקד', 'שביעות רצון, פתרון בפנייה ראשונה, זמן טיפול', 'המלצת AI לפעולה — מיד כשצריך'] },\n    { label: 'QA', heading: 'דמיינו ש‑100% מהשיחות נבדקות — לא מדגם', points: ['סריקה אוטומטית של כל שיחה ושיחה', 'ציון לפי נהלים, טון ופתרון בפנייה אחת', 'ניתוב אוטומטי לחניכה במקרה הצורך'] },\n    { label: 'עובד חדש', heading: 'דמיינו שעובד חדש מתאמן בסביבה בטוחה עם מאמן AI', points: ['שיחות תרגול מדומות וללא סיכון', 'AI Training Coach נותן טיפים בזמן אמת', 'מסלול חניכה מובנה, יום אחר יום'] },\n  ];\n\n  TEAM = [\n    { code: 'CP', name: 'AI Copilot', desc: 'מציע ניסוחים ותשובות לנציג בזמן אמת' },\n    { code: 'QA', name: 'AI QA Expert', desc: 'סורק 100% מהשיחות ומדרג איכות' },\n    { code: 'KN', name: 'AI Knowledge Expert', desc: 'שולף את התשובה הנכונה ממאגר הידע' },\n    { code: 'OP', name: 'AI Operations Manager', desc: 'מנטר עומסים ומאזן משמרות בזמן אמת' },\n    { code: 'TC', name: 'AI Training Coach', desc: 'מלווה נציגים חדשים בתרגול והדרכה' },\n    { code: 'IN', name: 'AI Insights Analyst', desc: 'מזהה מגמות ותובנות מכל השיחות' },\n    { code: 'AU', name: 'AI Automation Expert', desc: 'מבצע פעולות ותהליכים חוזרים אוטומטית' },\n    { code: 'BA', name: 'AI Business Advisor', desc: 'ממליץ החלטות עסקיות מבוססות נתונים' },\n  ];\n\n  PAL = [[79,195,254],[139,92,246],[236,72,153]];\n\n  componentDidMount() {\n    this.timers = [];\n    this.ctimers = [];\n    this.orbs = [];\n    this.applyChatSide();\n    this.setupCanvases();\n    this._onResize = () => this.setupCanvases();\n    window.addEventListener('resize', this._onResize);\n    const loop = (now) => {\n      const t = now / 1000;\n      this.drawBg(t);\n      this.orbs.forEach((el) => this.drawOrb(el, t));\n      this.raf = requestAnimationFrame(loop);\n    };\n    this.raf = requestAnimationFrame(loop);\n    this.runTab(0);\n    const sec = document.getElementById('team-section');\n    if (sec && 'IntersectionObserver' in window) {\n      this._io = new IntersectionObserver((es) => {\n        es.forEach((e) => { if (e.isIntersecting) { this.runTeamCursor(); this._io.disconnect(); } });\n      }, { threshold: 0.35 });\n      this._io.observe(sec);\n    }\n  }\n\n  toggleTeam(i) {\n    this.setState((s) => {\n      const t = s.teamActive.slice();\n      t[i] = !t[i];\n      return { teamActive: t };\n    });\n  }\n\n  cat(ms, fn) { const id = setTimeout(fn, ms); this.ctimers.push(id); return id; }\n\n  runTeamCursor() {\n    if (this._cursorRunning) return;\n    this._cursorRunning = true;\n    const sec = document.getElementById('team-section');\n    const cur = document.getElementById('team-cursor');\n    if (!sec || !cur) return;\n    const base = [true, false, false, false, false, false, false, true];\n    const toOn = [3, 1, 5, 2, 6, 4];\n    const center = (i) => {\n      const el = sec.querySelector('[data-team-card=\"' + i + '\"]');\n      if (!el) return null;\n      const r = el.getBoundingClientRect(), s = sec.getBoundingClientRect();\n      return { x: r.left - s.left + r.width / 2, y: r.top - s.top + r.height / 2 };\n    };\n    const move = (i) => { const c = center(i); if (c) { cur.style.left = (c.x - 4) + 'px'; cur.style.top = (c.y - 2) + 'px'; } };\n    const press = (i) => {\n      cur.style.animation = 'gav-press .45s ease';\n      this.cat(450, () => { cur.style.animation = ''; });\n      this.setState((s) => { const t = s.teamActive.slice(); t[i] = true; return { teamActive: t }; });\n    };\n    const cycle = () => {\n      this.setState({ teamActive: base.slice() });\n      const first = center(toOn[0]);\n      this.cat(400, () => { if (first) { cur.style.left = (first.x - 4) + 'px'; cur.style.top = (first.y - 80) + 'px'; } cur.style.opacity = '1'; });\n      let t = 950;\n      toOn.forEach((idx) => {\n        this.cat(t, () => move(idx));\n        this.cat(t + 760, () => press(idx));\n        t += 1250;\n      });\n      this.cat(t + 1700, () => { cur.style.opacity = '0'; });\n      this.cat(t + 3300, cycle);\n    };\n    cycle();\n  }\n\n  componentWillUnmount() {\n    cancelAnimationFrame(this.raf);\n    (this.timers || []).forEach(clearTimeout);\n    (this.ctimers || []).forEach(clearTimeout);\n    if (this._io) this._io.disconnect();\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  componentDidUpdate(prev) {\n    if (prev.chatSide !== this.props.chatSide) this.applyChatSide();\n    if (prev.bgStyle !== this.props.bgStyle || prev.bgDensity !== this.props.bgDensity) this.setupCanvases();\n  }\n\n  applyChatSide() {\n    let s = document.getElementById('gav-fc-pos');\n    if (!s) { s = document.createElement('style'); s.id = 'gav-fc-pos'; document.head.appendChild(s); }\n    const side = this.props.chatSide || 'left';\n    const other = side === 'left' ? 'right' : 'left';\n    s.textContent = '#fc_frame{position:fixed!important;bottom:20px!important;' + side + ':20px!important;' + other + ':auto!important;z-index:2147483000!important;}';\n  }\n\n  setupCanvases() {\n    const dpr = Math.min(2, window.devicePixelRatio || 1);\n    const prep = (el, w, h) => {\n      el.width = w * dpr; el.height = h * dpr;\n      const ctx = el.getContext('2d');\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      el._ctx = ctx; el._cw = w; el._ch = h;\n    };\n    const bg = document.getElementById('gav-bg');\n    if (bg) {\n      prep(bg, window.innerWidth, window.innerHeight);\n      const density = this.props.bgDensity || 60;\n      const area = window.innerWidth * window.innerHeight;\n      const flow = (this.props.bgStyle || 'aurora') === 'flow';\n      const mult = flow ? 3.2 : 1;\n      const n = Math.round(density * mult * area / (1440 * 900));\n      bg._p = [];\n      for (let i = 0; i < n; i++) {\n        const x = Math.random() * bg._cw, y = Math.random() * bg._ch;\n        bg._p.push({\n          x: x, y: y, px: x, py: y,\n          vx: (Math.random() - 0.5) * 0.22, vy: (Math.random() - 0.5) * 0.22,\n          spd: 0.26 + Math.random() * 0.38, life: Math.random() * 220,\n          size: 0.6 + Math.random() * 1.6, col: this.PAL[i % 3],\n        });\n      }\n      bg._blobs = [];\n      const mn = Math.min(bg._cw, bg._ch);\n      for (let i = 0; i < 7; i++) {\n        bg._blobs.push({\n          cx: Math.random() * bg._cw, cy: Math.random() * bg._ch,\n          r: (0.26 + Math.random() * 0.26) * mn,\n          ax: bg._cw * (0.08 + Math.random() * 0.16), ay: bg._ch * (0.08 + Math.random() * 0.16),\n          sx: 0.03 + Math.random() * 0.045, sy: 0.03 + Math.random() * 0.045,\n          pr: 0.12 + Math.random() * 0.22, ph: Math.random() * 6.28, col: this.PAL[i % 3],\n        });\n      }\n      bg._nodes = [];\n      const nn = Math.min(120, Math.round(density * 1.1 * area / (1440 * 900)));\n      for (let i = 0; i < nn; i++) {\n        bg._nodes.push({\n          x: Math.random() * bg._cw, y: Math.random() * bg._ch,\n          vx: (Math.random() - 0.5) * 0.28, vy: (Math.random() - 0.5) * 0.28,\n          size: 1 + Math.random() * 1.4, col: this.PAL[i % 3],\n        });\n      }\n    }\n    this.orbs = Array.from(document.querySelectorAll('[data-orb]'));\n    this.orbs.forEach((el) => {\n      const r = el.getBoundingClientRect();\n      prep(el, r.width, r.height);\n      const big = r.width > 120;\n      const n = big ? 48 : 20;\n      el._p = [];\n      for (let i = 0; i < n; i++) {\n        el._p.push({\n          a0: Math.random() * Math.PI * 2,\n          r: 0.55 + Math.random() * 0.5,\n          speed: (0.15 + Math.random() * 0.4) * (Math.random() < 0.5 ? -1 : 1),\n          ry: 0.32 + Math.random() * 0.28,\n          size: 1 + Math.random() * (big ? 1.8 : 1),\n          col: this.PAL[i % 3],\n        });\n      }\n    });\n  }\n\n  drawBg(t) {\n    const el = document.getElementById('gav-bg');\n    if (!el || !el._ctx || !el._p) return;\n    const st = this.props.bgStyle || 'aurora';\n    if (st === 'flow') this.drawBgFlow(el, t);\n    else if (st === 'constellation') this.drawBgConstellation(el, t);\n    else if (st === 'particles') this.drawBgParticles(el, t);\n    else this.drawBgAurora(el, t);\n  }\n\n  drawBgParticles(el, t) {\n    const ctx = el._ctx, w = el._cw, h = el._ch;\n    ctx.clearRect(0, 0, w, h);\n    ctx.globalCompositeOperation = 'lighter';\n    for (const p of el._p) {\n      p.x += p.vx; p.y += p.vy;\n      if (p.x < -20) p.x = w + 20; if (p.x > w + 20) p.x = -20;\n      if (p.y < -20) p.y = h + 20; if (p.y > h + 20) p.y = -20;\n      const rad = p.size * 7;\n      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rad);\n      g.addColorStop(0, 'rgba(' + p.col[0] + ',' + p.col[1] + ',' + p.col[2] + ',0.5)');\n      g.addColorStop(1, 'rgba(' + p.col[0] + ',' + p.col[1] + ',' + p.col[2] + ',0)');\n      ctx.fillStyle = g;\n      ctx.beginPath(); ctx.arc(p.x, p.y, rad, 0, 6.2832); ctx.fill();\n    }\n    ctx.globalCompositeOperation = 'source-over';\n  }\n\n  drawBgFlow(el, t) {\n    const ctx = el._ctx, w = el._cw, h = el._ch;\n    const spd = this.props.orbSpeed || 1;\n    // trailing fade — paint a translucent veil the exact page colour so streaks decay\n    ctx.globalCompositeOperation = 'source-over';\n    ctx.fillStyle = 'rgba(10,8,23,0.11)';\n    ctx.fillRect(0, 0, w, h);\n    // slow \"breathing\" that swells and eases the whole field\n    const breath = 0.72 + 0.34 * Math.sin(t * 0.35);\n    ctx.globalCompositeOperation = 'lighter';\n    for (const p of el._p) {\n      const a = (Math.sin(p.x * 0.0016 + t * 0.08) + Math.sin(p.y * 0.0021 - t * 0.06) + Math.sin((p.x + p.y) * 0.0011 + t * 0.05)) * 1.15;\n      const ang = a * Math.PI;\n      const step = p.spd * spd * breath;\n      p.px = p.x; p.py = p.y;\n      p.x += Math.cos(ang) * step;\n      p.y += Math.sin(ang) * step;\n      p.life -= 1;\n      if (p.x < -10 || p.x > w + 10 || p.y < -10 || p.y > h + 10 || p.life < 0) {\n        p.x = Math.random() * w; p.y = Math.random() * h; p.px = p.x; p.py = p.y;\n        p.life = 120 + Math.random() * 220;\n      }\n      const c = p.col, al = 0.55 * breath;\n      ctx.strokeStyle = 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + al + ')';\n      ctx.lineWidth = p.size * 0.9;\n      ctx.lineCap = 'round';\n      ctx.beginPath();\n      ctx.moveTo(p.px, p.py);\n      ctx.lineTo(p.x, p.y);\n      ctx.stroke();\n    }\n    // glowing heads for a touch of extra energy\n    for (let i = 0; i < el._p.length; i += 7) {\n      const p = el._p[i], c = p.col;\n      const rad = p.size * 4 * breath;\n      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rad);\n      g.addColorStop(0, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0.55)');\n      g.addColorStop(1, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0)');\n      ctx.fillStyle = g;\n      ctx.beginPath(); ctx.arc(p.x, p.y, rad, 0, 6.2832); ctx.fill();\n    }\n    ctx.globalCompositeOperation = 'source-over';\n  }\n\n  drawBgAurora(el, t) {\n    const ctx = el._ctx, w = el._cw, h = el._ch;\n    if (!el._blobs) return;\n    const spd = this.props.orbSpeed || 1;\n    ctx.clearRect(0, 0, w, h);\n    ctx.globalCompositeOperation = 'lighter';\n    for (const b of el._blobs) {\n      const bx = b.cx + Math.cos(t * b.sx * spd + b.ph) * b.ax;\n      const by = b.cy + Math.sin(t * b.sy * spd + b.ph) * b.ay;\n      const r = b.r * (0.82 + 0.22 * Math.sin(t * b.pr * spd + b.ph));\n      const c = b.col;\n      const g = ctx.createRadialGradient(bx, by, 0, bx, by, r);\n      g.addColorStop(0, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0.15)');\n      g.addColorStop(0.5, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0.05)');\n      g.addColorStop(1, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0)');\n      ctx.fillStyle = g;\n      ctx.beginPath(); ctx.arc(bx, by, r, 0, 6.2832); ctx.fill();\n    }\n    ctx.globalCompositeOperation = 'source-over dColorStop(1, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0)');\n      ctx.fillStyle = g;\n      ctx.beginPath(); ctx.arc(cx, cy, rr, 0, 6.2832); ctx.fill();\n    }\n    for (const p of el._p) {\n      const ang = p.a0 + t * p.speed * spd;\n      const x = cx + Math.cos(ang) * R * p.r;\n      const y = cy + Math.sin(ang) * R * p.r * p.ry;\n      const depth = (Math.sin(ang) + 1) / 2;\n      const size = p.size * (0.5 + depth);\n      const rad = size * 3;\n      const g = ctx.createRadialGradient(x, y, 0, x, y, rad);\n      g.addColorStop(0, 'rgba(' + p.col[0] + ',' + p.col[1] + ',' + p.col[2] + ',' + (0.35 + depth * 0.5) + ')');\n      g.addColorStop(1, 'rgba(' + p.col[0] + ',' + p.col[1] + ',' + p.col[2] + ',0)');\n      ctx.fillStyle = g;\n      ctx.beginPath(); ctx.arc(x, y, rad, 0, 6.2832); ctx.fill();\n    }\n    ctx.globalCompositeOperation = 'source-over';\n  }\n\n  at(ms, fn) { const id = setTimeout(fn, ms); this.timers.push(id); return id; }\n  clearTimers() { (this.timers || []).forEach(clearTimeout); this.timers = []; }\n\n  typeText(key, str, speed, done) {\n    let i = 0;\n    const step = () => {\n      i++;\n      this.setState({ [key]: str.slice(0, i) });\n      if (i < str.length) { const id = setTimeout(step, speed); this.timers.push(id); }\n      else if (done) { const id = setTimeout(done, 400); this.timers.push(id); }\n    };\n    step();\n  }\n\n  animateValue(key, to, dur) {\n    const start = performance.now();\n    const step = () => {\n      const p = Math.min(1, (performance.now() - start) / dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      this.setState({ [key]: Math.round(to * e) });\n      if (p < 1) { const id = setTimeout(step, 20); this.timers.push(id); }\n    };\n    step();\n  }\n\n  setTab(i) {\n    if (i === this.state.activeTab) return;\n    this.setState({ activeTab: i });\n    this.runTab(i);\n  }\n\n  runTab(tab) {\n    this.clearTimers();\n    if (tab === 0) {\n      this.setState({ cShowUser: false, cTyping: false, cS ip: true }));\n      this.at(9500, () => { if (this.state.activeTab === 4) this.runTab(4); });\n    }\n  }\n\n  fmtSecs(s) { const m = Math.floor(s / 60); const ss = String(s % 60).padStart(2, '0'); return m + ':' + ss; }\n\n  renderVals() {\n    const s = this.state;\n    const active = s.activeTab;\n    return {\n      ...s,\n      isTab0: active === 0, isTab1: active === 1, isTab2: active === 2, isTab3: active === 3, isTab4: active === 4,\n      heading: this.TABS[active].heading,\n      points: this.TABS[active].points,\n      activeCount: s.teamActive.filter(Boolean).length,\n      team: this.TEAM.map((m, i) => {\n        const on = s.teamActive[i];\n        return {\n          ...m, idx: i,\n          onClick: () => this.toggleTeam(i),\n          opacity: on ? '1' : '0.42',\n          borderColor: on ? 'rgba(139,92,246,0.35)' : 'rgba(255,255,255,0.06)',\n          iconBg: on ? 'linear-gradient(135deg,rgba(79,195,254,0.22),rgba(236,72,153,0.16))' : 'rgba(255,255,255,0.05)',\n          iconBorder: on ? 'rgba(139,92,246,0.4)' : 'rgba(255,255,255,0.12)',\n          iconColor: on ? '#e8e6f0' : 'rgba(255,255,255,0.45)',\n          dotColor: on ? '#34d399' : 'rgba(255,255,255,0.3)',\n          dotAnim: on ? 'gav-pulse 2s infinite' : 'none',\n          statusColor: on ? '#34d399' : 'rgba(255,255,255,0.42)',\n          statusText: on ? 'ACTIVE' : 'OFF',\n        };\n      }),\n      tabs: this.TABS.map((t, i) => ({\n        label: t.label,\n        active: i === active,\n        color: i === active ? '#ffffff' : 'rgba(255,255,255,0.5)',\n        onClick: () => this.setTab(i),\n      })),\n      mSatFmt: s.mSat + '%',\n      mFcrFmt: s.mFcr + '%',\n      mAhtFmt: this.fmtSecs(s.mAht),\n      mCallsFmt: s.mCalls.toLocaleString('he-IL'),\n      qScannedFmt: s.qScanned + '/214',\n      qScanPct: Math.round(s.qScanned / 214 * 100),\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
